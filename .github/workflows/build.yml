name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux: apt ──
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavformat-dev libavcodec-dev \
            libavutil-dev libswscale-dev libpng-dev

      # ── Windows: vcpkg ──
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd "${VCPKG_INSTALLATION_ROOT}"
          git pull
          ./bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=${VCPKG_INSTALLATION_ROOT}" >> "$GITHUB_ENV"

      # ── macOS: Homebrew ──
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg libpng

      # ── Configure ──
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      # ── Build ──
      - name: Build
        run: cmake --build build --config Release

      # ── Prepare artifact ──
      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/Release/Kohane.exe dist/Kohane-${{ matrix.label }}.exe
          else
            cp build/Kohane dist/Kohane-${{ matrix.label }}
            chmod +x dist/Kohane-${{ matrix.label }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: Kohane-${{ matrix.label }}
          path: dist/*

  # ── Release (仅 tag 推送时) ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
